name: "Upgrade gh-aw"

on:
  schedule:
    - cron: "30 9 * * 1" # Mondays at 9:30 AM UTC (after dependabot's 9:00)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install gh-aw CLI
        run: gh extension install github/gh-aw --force
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run gh aw upgrade
        run: gh aw upgrade
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Recompile lock files
        run: gh aw compile

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No gh-aw updates available."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "gh-aw updates detected:"
            git diff --stat
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/gh-aw-upgrade-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(deps): upgrade gh-aw agentic workflows

          Ran \`gh aw upgrade && gh aw compile\` to update
          github/gh-aw-actions pins and recompile lock files.

          Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(deps): upgrade gh-aw agentic workflows" \
            --body "Automated weekly upgrade of gh-aw action pins and lock file recompilation.

          Generated by \`gh aw upgrade && gh aw compile\`." \
            --label "dependencies,automated,github-actions"
        env:
          GH_TOKEN: ${{ github.token }}
